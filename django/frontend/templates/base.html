<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EDULedger</title>
    <link rel="icon" type="image/png" href="/static/images/logo.png?v=1" sizes="32x32">
    <link rel="apple-touch-icon" href="/static/images/logo.png?v=1">
    <link rel="shortcut icon" href="/static/images/logo.png?v=1">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-body: #111111;
            --bg-sidebar: #111111;
            --bg-card: #18181A;
            --border-sidebar: #FFFFFF;
            --border-blue: #1C64F2;
            --border-red: #DC2626;
            --border-yellow: #CA8A04;
            --text-main: #FFFFFF;
            --text-muted: #AAAAAA;
            --active-nav-bg: #222222;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 250px;
            background-color: var(--bg-sidebar);
            border-right: 3px solid var(--border-sidebar);
            display: flex;
            flex-direction: column;
            border-top-right-radius: 40px;
            padding-top: 30px;
            height: 100%;
            box-sizing: border-box;
        }

        .sidebar-brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .sidebar-brand img {
            width: 100px;
            margin-bottom: -15px;
        }
        
        .sidebar-brand h2 {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.2;
            margin: 0;
            letter-spacing: 0.5px;
        }

        .nav-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 0 20px;
            flex-grow: 1;
        }

        .nav-link {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 600;
            font-size: 0.9rem;
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .nav-link svg {
            width: 22px;
            height: 22px;
            margin-right: 15px;
            opacity: 0.9;
        }

        .nav-link:hover, .nav-link.active {
            background-color: var(--active-nav-bg);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar-profile {
            border-top: 3px solid var(--border-sidebar);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
            transition: 0.2s;
        }
        .sidebar-profile:hover {
            background-color: var(--active-nav-bg);
        }
        
        .profile-avatar {
            width: 45px;
            height: 45px;
            background-color: #3b71ca;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .profile-info h4 {
            margin: 0;
            font-size: 0.95rem;
        }
        
        .profile-info p {
            margin: 0;
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        
        /* Main Content */
        .main-content {
            flex-grow: 1;
            padding: 30px 40px;
            overflow-y: auto;
            position: relative;
        }

        /* Top Header */
        .top-header {
            position: absolute;
            top: 30px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .school-year {
            border: 1px solid var(--text-muted);
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .notification-icon {
            cursor: pointer;
        }
        
        /* Utility Classes */
        .page-header h3 {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 500;
            margin: 0 0 5px 0;
        }
        .page-header h1 {
            font-size: 2.2rem;
            font-weight: 700;
            margin: 0 0 30px 0;
        }

        .card {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            box-sizing: border-box;
        }
        
        .card-blue { border: 2px solid var(--border-blue); box-shadow: 0 0 10px rgba(28,100,242,0.2); }
        .card-red { border: 2px solid var(--border-red); box-shadow: 0 0 10px rgba(220,38,38,0.2); }
        .card-yellow { border: 2px solid var(--border-yellow); box-shadow: 0 0 10px rgba(202,138,4,0.2); }

        /* Tables */
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        .data-table th, .data-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #333333;
        }
        .data-table th {
            font-weight: 600;
            color: var(--text-main);
        }
        .data-table tr:hover {
            background-color: #222222;
        }
        .status-badge {
            border: 1px solid #888888;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
        }
        .status-danger {
            border-color: #CA8A04;
            color: #CA8A04;
        }
        .btn {
            background-color: #3b71ca;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            transition: 0.2s;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #3b71ca;
        }
        .btn:hover { background-color: #2b5db0; }

        .search-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            align-items: center;
        }
        .search-input {
            background-color: transparent;
            border: 1px solid #555555;
            color: white;
            padding: 10px 15px;
            border-radius: 8px;
            width: 300px;
            font-family: inherit;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-left: auto;
        }

        /* Global Modals overlay */
        #global-modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.8); z-index: 9999;
            align-items: center; justify-content: center;
        }
        .global-modal-content {
            background: #1a1a1a; width: 380px; border-radius: 16px; padding: 30px; text-align: center;
            border: 2px solid #555; position: relative; max-width: 90vw;
        }
        .global-modal-content.border-red { border-color: #ef4444; }
        .global-modal-content.border-blue { border-color: #3b71ca; }
        #global-modal-title { font-size: 1.3rem; margin: 0 0 10px 0; font-weight: 700; }
        #global-modal-msg { color: #aaa; font-size: 0.95rem; margin-bottom: 25px; line-height: 1.5; }
        .global-actions { display: flex; justify-content: center; gap: 15px; }

        .btn-pill {
            padding: 8px 24px; border-radius: 30px; font-size: 0.9rem; font-weight: 600; color: white; border: none; cursor: pointer; transition: 0.2s;
        }
        .btn-pill:hover { opacity: 0.8; }
        .btn-cancel { background: transparent; border: 1px solid #555; color: #fff; }
    </style>
    <script>
    // Scope localStorage data per user
    (function() {
        var originalGet = localStorage.getItem;
        var originalSet = localStorage.setItem;
        var originalRemove = localStorage.removeItem;
        var globalKeys = ['username', 'registeredUsers', 'userNames'];

        localStorage.getItem = function(key) {
            if (!globalKeys.includes(key)) {
                var user = originalGet.call(this, 'username');
                if (user) return originalGet.call(this, key + '_' + user);
            }
            return originalGet.call(this, key);
        };

        localStorage.setItem = function(key, value) {
            if (!globalKeys.includes(key)) {
                var user = originalGet.call(this, 'username');
                if (user) return originalSet.call(this, key + '_' + user, value);
            }
            return originalSet.call(this, key, value);
        };

        localStorage.removeItem = function(key) {
            if (!globalKeys.includes(key)) {
                var user = originalGet.call(this, 'username');
                if (user) return originalRemove.call(this, key + '_' + user);
            }
            return originalRemove.call(this, key);
        };
    })();
    </script>
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-brand">
            <img src="/static/images/logo.png" alt="Logo">
            <h2><span style="color:#ffffff;">EDU</span><span style="color:#3b71ca;">Ledger</span></h2>
        </div>
        
        <nav class="nav-menu">
            <a href="/dashboard/" class="nav-link" id="nav-dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path></svg>
                Dashboard
            </a>
            <a href="/subjects/" class="nav-link" id="nav-subjects">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"></path><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"></path></svg>
                Classes
            </a>
            <a href="/students/" class="nav-link" id="nav-students">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
                Students
            </a>
            <a href="/schedule/" class="nav-link" id="nav-schedule">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                Schedule
            </a>
            <a href="/reports/" class="nav-link" id="nav-reports">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                Reports
            </a>
            <hr style="border:0; height:1px; background:#333; margin: 10px 0;">
            <a href="#" class="nav-link" onclick="logout(event)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                Logout
            </a>
        </nav>
        
        <a href="/profile/" class="sidebar-profile">
            <div class="profile-avatar" id="sidebar-initial">M</div>
            <div class="profile-info">
                <h4 id="sidebar-name">Username</h4>
                <p>Teacher</p>
            </div>
        </a>
    </aside>

    <main class="main-content">
        <div class="top-header">
            <!-- Removed 2025-2026 and notification bell per user request -->
        </div>
        
        {% block content %}{% endblock %}
    </main>

    <script>
        // Set active nav link
        document.addEventListener('DOMContentLoaded', () => {
            const currentPath = window.location.pathname;
            document.querySelectorAll('.nav-link').forEach(link => {
                const href = link.getAttribute('href');
                if (href !== '#' && currentPath.includes(href)) {
                    link.classList.add('active');
                }
            });

            // Set username from localStorage
            const username = localStorage.getItem('username');
            if (username) {
                const userNames = JSON.parse(localStorage.getItem('userNames') || '{}');
                const display = (userNames[username] && userNames[username].trim() !== '') ? userNames[username] : username.split('@')[0];
                document.getElementById('sidebar-name').textContent = display;
                document.getElementById('sidebar-initial').textContent = display.charAt(0).toUpperCase();
                
                // Add to any greeting header
                const greeting = document.getElementById('base-greeting-name');
                if(greeting) greeting.textContent = display;
            } else {
                // If not logged in, force redirect in JS just to be safe
                if (window.location.pathname !== '/' && window.location.pathname !== '/register/') {
                    window.location.href = '/';
                }
            }
        });

        function logout(e) {
            e.preventDefault();
            customConfirm("Are you sure you want to log out of EDULedger? You will need to sign in again to access your student records.", function() {
                localStorage.removeItem('username');
                window.location.href = '/';
            }, "Confirm Logout", "#3b71ca", "Logout Now");
        }

        // --- GLOBAL INTERFACE REPLACEMENTS ---
        let __globalConfirmCallback = null;

        window.customAlert = function(msg, title="Notice") {
            const overlay = document.getElementById('global-modal-overlay');
            const card = document.getElementById('global-modal-card');
            card.className = "global-modal-content border-blue";
            document.getElementById('global-modal-title').innerText = title;
            document.getElementById('global-modal-msg').innerText = msg;
            
            document.getElementById('global-btn-cancel').style.display = 'none';
            const okBtn = document.getElementById('global-btn-ok');
            okBtn.innerText = "OK";
            okBtn.style.background = "#3b71ca";
            okBtn.onclick = function() { overlay.style.display = 'none'; };
            
            overlay.style.display = 'flex';
        };

        window.customConfirm = function(msg, onConfirm, title="Are you sure?", btnColor="#ef4444", okText="Confirm") {
            const overlay = document.getElementById('global-modal-overlay');
            const card = document.getElementById('global-modal-card');
            card.className = `global-modal-content ${btnColor === '#ef4444' ? 'border-red' : 'border-blue'}`;
            
            document.getElementById('global-modal-title').innerText = title;
            document.getElementById('global-modal-msg').innerText = msg;
            
            document.getElementById('global-btn-cancel').style.display = 'block';
            document.getElementById('global-btn-cancel').onclick = function() { overlay.style.display = 'none'; };
            
            const okBtn = document.getElementById('global-btn-ok');
            okBtn.innerText = okText;
            okBtn.style.background = btnColor;
            okBtn.onclick = function() { 
                overlay.style.display = 'none'; 
                if(onConfirm) onConfirm(); 
            };
            
            overlay.style.display = 'flex';
        };
    </script>
    
    <!-- Global DOM structure for alerts -->
    <div id="global-modal-overlay">
        <div id="global-modal-card" class="global-modal-content border-blue">
            <h3 id="global-modal-title">Notice</h3>
            <p id="global-modal-msg">Here is a message.</p>
            <div class="global-actions">
                <button class="btn-pill btn-cancel" id="global-btn-cancel">Cancel</button>
                <button class="btn-pill" id="global-btn-ok" style="background:#3b71ca;">OK</button>
            </div>
        </div>
    </div>
    
    {% block scripts %}{% endblock %}
</body>
</html>
